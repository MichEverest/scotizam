<div class="sidebar-wrapper" [class.collapsed]="isCollapsed$ | async">
  <div class="sidebar-header">
    <div class="logo">SCO</div>
    <button class="menu-hamburger" (click)="toggleSidebar()" [class.open]="!(isCollapsed$ | async)">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li routerLinkActive="active">
        <a routerLink="/admin">
          <i class="icon-dashboard"></i> <span>Dashboard</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="/cotizaciones">
          <i class="icon-file-text"></i> <span>Cotizaciones</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="/clientes">
          <i class="icon-users"></i> <span>Clientes</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="/productos">
          <i class="icon-box"></i> <span>Productos</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <a (click)="logout()" class="logout-link">
      <i class="icon-log-out"></i> <span>Cerrar Sesión</span>
    </a>
  </div>
</div>
